<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photo Gallery</title>
	<link rel="stylesheet" href="css/gallery.css">
	<script src="js/gallery.js"></script>
</head>
<body onload="setupGallery()">

	<div id="image">
		Hover over an image below to display here.
	</div>

	<img class="preview" alt="Razer image 1" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ6rSBrLuxKqQgTn0qKSFKO-O9P9i7Rgffs1FHhW0if54HgQD5SUu_9yjot&s=10" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">

	<img class="preview" alt="Razer image 2" src="https://static0.pocketlintimages.com/wordpress/wp-content/uploads/wm/2024/08/untitled-1.jpg?w=1600&h=900&fit=crop" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">

	<img class="preview" alt="Razer image 3" src="https://i.ytimg.com/vi/Eq2cVlcamKY/maxresdefault.jpg" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">

	<img class="preview" alt="Razer image 4" src="https://file.hstatic.net/200000722513/file/chuot_razer_khong_day_viper_v3_pro_trang-3_029e188f37e44741be1341bfbdcb5b6b_grande.jpg" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">

	<img class="preview" alt="Razer image 5" src="https://azaudio.vn/wp-content/uploads/2024/04/razer-viper-v3-pro-white-4.jpg" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">

	<img class="preview" alt="Razer image 6" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtA3yiP7MUyPE1KPBUMcayJx1B4_ZwulY-joTNqyrtGRDcJty0ZF8VO7I&s=10" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">

</body>
</html>
